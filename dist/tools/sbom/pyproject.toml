[tool.poetry]
name = "riot_sbom"
version = "0.1.0"
description = "Create an sbom for a RIOT application"
authors = ["Daniel Lockau <daniel.lockau@ml-pa.com>"]
license = "MIT"
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.12"
spdx-tools = "^0.8.2"
sbomaudit = "^0.4.4"
sbom-manager = "^0.3.1"
sbom2doc = "^0.5.1"
scancode-toolkit = "^32.3.2"
jsonschema = "^4.23.0"


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
